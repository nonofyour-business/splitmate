<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SplitMate Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #0f172a;
      --surface: #ffffff;
      --background: #f8fafc;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

    body { background: var(--background); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; position: relative; overflow-x: hidden; }

    /* --- LAYOUT & SCREENS --- */
    .screen { display: none; min-height: 100vh; flex-direction: column; opacity: 0; transition: opacity 0.3s ease; }
    .screen.active { display: flex; opacity: 1; }

    /* --- TYPOGRAPHY & BUTTONS --- */
    h1, h2, h3 { color: var(--dark); font-weight: 800; }
    
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; padding: 14px; border: none; border-radius: var(--radius-md);
      font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
    .btn-primary:active { transform: translateY(2px); background: var(--primary-hover); }
    .btn-danger { background: var(--danger); color: white; }

    /* --- FLOATING ACTION BUTTON --- */
    .fab {
      position: fixed; bottom: 32px; right: 24px;
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--dark); color: white; border: none;
      font-size: 32px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: pointer; z-index: 100;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .fab:active { transform: scale(0.9); }

    /* --- LOGIN SCREEN --- */
    #screen-login { background: var(--dark); justify-content: center; padding: 32px; color: white; }
    .login-header { text-align: center; margin-bottom: 48px; }
    .login-header h1 { color: white; font-size: 42px; margin-top: 16px; }
    .login-header span { color: var(--primary); }
    .login-card { background: var(--surface); border-radius: var(--radius-lg); padding: 32px; color: var(--text); }
    
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-group input, select {
      width: 100%; padding: 14px 16px; border: 2px solid var(--border);
      border-radius: var(--radius-md); font-size: 16px; font-weight: 500;
      transition: border-color 0.2s; outline: none; background: var(--surface);
    }
    .input-group input:focus, select:focus { border-color: var(--primary); }

    /* --- HOME SCREEN --- */
    .header-glass {
      background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50; padding: 24px; border-bottom: 1px solid var(--border);
    }
    .balance-card { background: var(--dark); border-radius: var(--radius-lg); padding: 24px; color: white; margin: 24px; box-shadow: var(--shadow); }
    .balance-label { color: #94a3b8; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .balance-amount { font-size: 36px; font-weight: 800; }
    .balance-amount.positive { color: var(--success); }
    .balance-amount.negative { color: var(--danger); }

    /* --- LISTS & CARDS --- */
    .list-container { padding: 0 24px 100px; }
    .card {
      background: var(--surface); border-radius: var(--radius-md); padding: 16px;
      margin-bottom: 16px; display: flex; align-items: center; gap: 16px;
      box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s;
    }
    .card:active { transform: scale(0.98); }
    .card-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: #e0e7ff; }
    .card-content { flex: 1; }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .card-subtitle { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .card-value { text-align: right; font-weight: 800; font-size: 16px; }

    /* --- NATIVE MODALS --- */
    dialog {
      margin: auto; padding: 32px 24px; border: none; border-radius: var(--radius-lg);
      width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      background: var(--surface); color: var(--text);
    }
    dialog::backdrop { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .close-btn { background: none; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; }

    /* --- TOAST NOTIFICATIONS --- */
    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; }
    .toast { padding: 16px; border-radius: var(--radius-md); color: white; font-weight: 600; text-align: center; box-shadow: var(--shadow); animation: slideDown 0.3s ease forwards; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="toast-container"></div>

<main id="screen-login" class="screen active">
  <div class="login-header">
    <div style="font-size: 64px; margin-bottom: 16px;">💸</div>
    <h1><span>Split</span>Mate</h1>
    <p style="color: #94a3b8; margin-top: 8px;">Split expenses. Keep friends.</p>
  </div>
  <div class="login-card">
    <h2 style="margin-bottom: 8px;">Welcome back 👋</h2>
    <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 14px;">Enter your email for a magic link.</p>
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
    </div>
    <button class="btn btn-primary" onclick="app.auth.sendMagicLink()">Send Magic Link ✨</button>
  </div>
</main>

<main id="screen-home" class="screen">
  <header class="header-glass">
    <div style="font-size: 14px; color: var(--text-muted); font-weight: 600;">Good to see you,</div>
    <div id="home-username" style="font-size: 24px; font-weight: 800;">—</div>
  </header>
  
  <div class="balance-card">
    <div class="balance-label">Overall Balance</div>
    <div class="balance-amount neutral" id="home-balance">€0.00</div>
  </div>

  <div style="padding: 0 24px 16px; font-weight: 800; font-size: 18px;">Your Groups</div>
  <div class="list-container" id="groups-list">
    <div style="text-align: center; color: var(--text-muted); padding: 40px;">Loading groups...</div>
  </div>

  <button class="fab" onclick="document.getElementById('modal-create-group').showModal()">+</button>
</main>

<dialog id="modal-create-group">
  <div class="modal-header">
    <h2>New Group</h2>
    <button class="close-btn" onclick="this.closest('dialog').close()">×</button>
  </div>
  <div class="input-group">
    <label>Group Name</label>
    <input type="text" id="new-group-name" placeholder="e.g. Ski Trip 🏔️" />
  </div>
  <div class="input-group">
    <label>Add Member Email</label>
    <div style="display: flex; gap: 8px;">
      <input type="email" id="member-email-input" placeholder="friend@email.com" />
      <button class="btn btn-primary" style="width: auto; padding: 0 20px;" onclick="app.groups.stageMember()">Add</button>
    </div>
  </div>
  <div id="pending-members" style="margin-bottom: 24px;"></div>
  <button class="btn btn-primary" onclick="app.groups.create()">Create Group 🎉</button>
</dialog>

<script>
// --- CONFIGURATION ---
// Note: In production, NEVER expose a service_role key. Anon keys are fine if Row Level Security (RLS) is configured in Supabase.
const SUPABASE_URL = 'https://vfxzgsywikkzayxwcsmk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmeHpnc3l3aWtremF5eHdjc21rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDg0MzIsImV4cCI6MjA4ODQ4NDQzMn0.wYK18UAK22m6zCImMaHyCwcWILkGexaXCn0OzNrvd6c'; // Replace with the actual Anon Key provided by Supabase
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- APP STATE & LOGIC ---
const app = {
  state: {
    user: null,
    currentGroup: null,
    stagedMembers: []
  },

  ui: {
    showScreen: (screenId) => {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(`screen-${screenId}`).classList.add('active');
    },
    toast: (msg, type = 'success') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 4000);
    },
    formatMoney: (amount) => `€${parseFloat(Math.abs(amount)).toFixed(2)}`
  },

  auth: {
    init: () => {
      sb.auth.onAuthStateChange(async (event, session) => {
        if (session?.user) {
          app.state.user = session.user;
          await app.home.load();
          app.ui.showScreen('home');
        } else {
          app.ui.showScreen('login');
        }
      });
    },
    sendMagicLink: async () => {
      const email = document.getElementById('login-email').value.trim();
      if (!email) return app.ui.toast('Please enter your email', 'error');
      
      const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
      if (error) return app.ui.toast(error.message, 'error');
      app.ui.toast('✨ Magic link sent! Check your inbox.');
    }
  },

  home: {
    load: async () => {
      // 1. Fetch Profile
      const { data: profile } = await sb.from('profiles').select('display_name').eq('id', app.state.user.id).single();
      document.getElementById('home-username').textContent = profile?.display_name || app.state.user.email.split('@')[0];

      // 2. Fetch Memberships & Groups
      const { data: memberships } = await sb.from('group_members').select('group_id').eq('user_id', app.state.user.id);
      if (!memberships?.length) return app.home.renderGroups([]);

      const groupIds = memberships.map(m => m.group_id);
      const { data: groups } = await sb.from('groups').select('*').in('id', groupIds);
      
      app.home.renderGroups(groups || []);
      // Balance calculation logic would go here
    },
    renderGroups: (groups) => {
      const container = document.getElementById('groups-list');
      if (!groups.length) {
        container.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted);">No groups yet. Tap + to start!</div>`;
        return;
      }
      container.innerHTML = groups.map(g => `
        <div class="card" onclick="/* Navigate to group detail */">
          <div class="card-icon">👥</div>
          <div class="card-content">
            <div class="card-title">${g.name}</div>
            <div class="card-subtitle">Tap to view details</div>
          </div>
        </div>
      `).join('');
    }
  },

  groups: {
    stageMember: async () => {
      const email = document.getElementById('member-email-input').value.trim();
      if (!email) return;
      if (app.state.stagedMembers.find(m => m.email === email)) return app.ui.toast('Already added', 'error');
      
      // Look up user
      const { data: profile } = await sb.from('profiles').select('*').eq('email', email).single();
      if (!profile) return app.ui.toast('User not found. They must sign in first.', 'error');
      
      app.state.stagedMembers.push(profile);
      document.getElementById('member-email-input').value = '';
      
      // Render staged members
      const container = document.getElementById('pending-members');
      container.innerHTML = app.state.stagedMembers.map(m => `
        <div style="display:flex; justify-content:space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600;">
          ${m.display_name || m.email}
          <span style="color: var(--danger); cursor: pointer;" onclick="/* remove logic */">Remove</span>
        </div>
      `).join('');
    },
    create: async () => {
      const name = document.getElementById('new-group-name').value.trim();
      if (!name) return app.ui.toast('Enter a group name', 'error');

      // Create Group
      const { data: group, error } = await sb.from('groups').insert({ name, created_by: app.state.user.id }).select().single();
      if (error) return app.ui.toast(error.message, 'error');

      // Add Members
      const allMembers = [app.state.user.id, ...app.state.stagedMembers.map(m => m.id)];
      await sb.from('group_members').insert(allMembers.map(uid => ({ group_id: group.id, user_id: uid })));

      document.getElementById('modal-create-group').close();
      app.ui.toast('Group created!');
      app.home.load();
    }
  },
  
  // NOTE: In a real app, the 'Settle' function should look like this:
  // settleUp: async (debtorId, creditorId, amount) => {
  //   await sb.from('expenses').insert({
  //     group_id: app.state.currentGroup,
  //     paid_by: debtorId,
  //     description: 'Payment',
  //     amount: amount,
  //     is_settlement: true // New column to distinguish from normal expenses
  //   });
  //   // Then add a split allocating the -amount to the creditor.
  // }
};

// Initialize app
app.auth.init();
</script>
</body>
</html>
